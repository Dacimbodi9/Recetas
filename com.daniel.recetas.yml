Categories:
  - Food
License: MIT
AuthorName: Daniel Cimbollek Díaz
WebSite: https://recetasinfo.netlify.app/
SourceCode: https://github.com/dacimbdi/recetas
IssueTracker: https://github.com/dacimbdi/recetas/issues
Translation: https://github.com/dacimbdi/recetas/tree/main/lib/l10n.dart

RepoType: git
Repo: https://github.com/dacimbdi/recetas

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: b332d6a2e0975d38ac1801e1a372a52b90fb23a8
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - git -C $$flutter$$ checkout -f 3.41.2
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - $$flutter$$/bin/cache
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.0
CurrentVersionCode: 1
